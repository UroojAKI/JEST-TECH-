version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: jest-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jest_policy_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jest_policy_crm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jest-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: jest-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/jest_policy_crm?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-JEST_POLICY_SUPER_SECRET_KEY_CHANGE_IN_PRODUCTION_2026}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-JEST_POLICY_REFRESH_SECRET_KEY_CHANGE_IN_PRODUCTION_2026}
      ALLOWED_ORIGINS: http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: jest-web
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
    depends_on:
      - api
    restart: always

volumes:
  postgres_data:
