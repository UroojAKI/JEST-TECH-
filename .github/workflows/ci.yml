name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '24'

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.34.4'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint API
        run: pnpm --filter api lint
        continue-on-error: true

      - name: Lint Web
        run: pnpm --filter web lint
        continue-on-error: true

      - name: Type check API
        run: pnpm --filter api exec tsc --noEmit
        continue-on-error: true

  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jest_policy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/jest_policy_test
      JWT_SECRET: test-jwt-secret-minimum-32-characters-long
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: test-jwt-refresh-secret-minimum-32-chars
      JWT_REFRESH_EXPIRES_IN: 30d
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.34.4'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate

      - name: Wait for Postgres
        run: |
          # Prefer pg_isready if available, otherwise fall back to nc
          if command -v pg_isready >/dev/null 2>&1; then
            for i in {1..30}; do
              if pg_isready -h localhost -p 5432 -U postgres -q; then
                echo "Postgres is ready"
                break
              fi
              echo "Waiting for Postgres... ($i)"
              sleep 1
            done
          else
            for i in {1..30}; do
              if nc -z localhost 5432; then
                echo "Postgres port open"
                break
              fi
              echo "Waiting for Postgres port... ($i)"
              sleep 1
            done
          fi

      - name: Run database migrations
        run: pnpm --filter api exec prisma migrate deploy

      - name: Run tests with coverage
        run: pnpm --filter api test:cov

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: apps/coverage
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-type-check]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.34.4'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate

      - name: Build API
        run: pnpm --filter api build
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: Build Web
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000

  security-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
        continue-on-error: true
