name: JEST Policy CRM CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build, Lint and Test Workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prisma Client Generation
        run: pnpm --filter api exec prisma generate

      - name: Run Linting
        run: pnpm lint

      - name: Run Tests
        run: pnpm test

      - name: Build Applications
        run: pnpm build
        env:
          NODE_ENV: production
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/jest_policy_crm"
          JWT_SECRET: "mock_ci_secret"
          JWT_REFRESH_SECRET: "mock_ci_refresh_secret"
