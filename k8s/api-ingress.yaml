apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jest-ingress
  namespace: jest-policy
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/limit-rps: "100" # Rate limiting
spec:
  tls:
    - hosts:
        - api.jestpolicy.com
        - webhooks.jestpolicy.com
      secretName: jest-tls-secret
  rules:
    - host: api.jestpolicy.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jest-api-service
                port:
                  number: 80
    - host: webhooks.jestpolicy.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jest-api-service
                port:
                  number: 80
