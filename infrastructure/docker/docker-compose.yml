services:
  postgres:
    image: postgres:17
    container_name: jest-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jest_policy_crm

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7

    container_name: jest-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

  minio:
    image: minio/minio

    container_name: jest-minio

    restart: unless-stopped

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data

  mailhog:
    image: mailhog/mailhog

    container_name: jest-mailhog

    restart: unless-stopped

    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  minio_data: